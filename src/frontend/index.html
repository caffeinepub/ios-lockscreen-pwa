<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;background:#000;overflow:hidden;height:100%;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <title>Lockscreen</title>
    <style>
      /* Injected before any framework CSS to nuke safe-area insets */
      *, *::before, *::after {
        margin: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
      }
      html, body {
        width: 100% !important;
        height: 100% !important;
        background: #000 !important;
        overflow: hidden !important;
        -webkit-tap-highlight-color: transparent !important;
        -webkit-touch-callout: none !important;
        user-select: none !important;
        /* explicitly zero every safe-area-inset padding variant */
        padding-top: 0 !important;
        padding-right: 0 !important;
        padding-bottom: 0 !important;
        padding-left: 0 !important;
      }
      #root {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
        background: #000 !important;
        padding: 0 !important;
        margin: 0 !important;
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#000;overflow:hidden;height:100%;">
    <div id="root" style="position:fixed;top:0;left:0;width:100vw;height:100vh;overflow:hidden;background:#000;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
